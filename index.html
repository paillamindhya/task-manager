<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
width:400px;
margin:auto;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
cursor:pointer;
}

li{
margin:10px;
list-style:none;
}
</style>

</head>

<body>

<div class="container">

<h1>Task Management App</h1>

<input type="text" id="taskInput" placeholder="Enter task">

<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

let input=document.getElementById("taskInput");

let li=document.createElement("li");

li.innerHTML=input.value +
' <button onclick="this.parentElement.remove()">Delete</button>';

document.getElementById("taskList").appendChild(li);

input.value="";

}

</script>

</body>
</html>
